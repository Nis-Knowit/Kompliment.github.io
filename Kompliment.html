<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Komplimenter">
  <meta name="theme-color" content="#f8b4c8">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Komplimenter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      color: #2d2d3a;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      transition: background 600ms ease;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
      position: relative;
    }

    body.balder-mode { background: linear-gradient(135deg, #f5deb3 0%, #c19a6b 100%); }
    body.lykke-mode  { background: linear-gradient(135deg, #ffd1dc 0%, #e89bb0 100%); }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 8px;
    }

    #foto {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 0 24px 0;
      border: 4px solid rgba(255,255,255,0.78);
      box-shadow: 0 6px 20px rgba(45, 45, 58, 0.2);
      animation: dukOp 400ms ease-out;
    }

    @keyframes dukOp {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    #indhold {
      width: 100%;
      transition: opacity 250ms ease, transform 250ms ease;
    }

    #indhold.skifter {
      opacity: 0;
      transform: translateY(8px);
    }

    #tekst {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 600;
      line-height: 1.35;
      text-align: center;
    }

    /* Kupon-styling */
    #indhold.kupon {
      background: #fffaf0;
      border: 3px dashed #c19a6b;
      border-radius: 18px;
      padding: 40px 24px 36px;
      position: relative;
      box-shadow: 0 10px 30px rgba(45, 45, 58, 0.18);
      max-width: 460px;
      margin: 0 auto;
    }

    #indhold.kupon::before {
      content: "KUPON";
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: #c19a6b;
      color: #fff;
      padding: 5px 16px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    #indhold.kupon::after {
      content: "Tryk på \"Indløs\" for at sende den til Nis";
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #fffaf0;
      color: #c19a6b;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #c19a6b;
      white-space: nowrap;
    }

    #indhold.kupon #tekst {
      font-style: italic;
      font-size: clamp(1.4rem, 5.5vw, 2rem);
      color: #5a3e1f;
    }

    /* Bund-knapper */
    .knapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    button {
      appearance: none;
      border: none;
      font: inherit;
      font-weight: 600;
      font-size: 1.05rem;
      color: #fff;
      background: #2d2d3a;
      padding: 18px 32px;
      border-radius: 999px;
      min-width: 240px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(45, 45, 58, 0.25);
      transition: transform 120ms ease, box-shadow 120ms ease, background 200ms ease;
    }

    button:active {
      transform: scale(0.97);
      box-shadow: 0 3px 10px rgba(45, 45, 58, 0.25);
    }

    #indlosKnap {
      background: #c19a6b;
      box-shadow: 0 6px 20px rgba(193, 154, 107, 0.45);
    }

    /* Mode-toggles */
    .toggles {
      position: fixed;
      top: max(env(safe-area-inset-top), 16px);
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .toggle {
      width: 48px;
      height: 48px;
      min-width: 0;
      padding: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      color: #2d2d3a;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(45,45,58,0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .toggle.active.balder { background: #c19a6b; color: #fff; }
    .toggle.active.lykke  { background: #e89bb0; color: #fff; }

    .toggle svg { width: 26px; height: 26px; }

    /* Svævende hjerter */
    .heart {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: floatUp 1.6s ease-out forwards;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translate(-50%, 0) scale(0.4) rotate(0deg); }
      15%  { opacity: 1; }
      100% { opacity: 0;
             transform: translate(calc(-50% + var(--dx)), calc(-260px + var(--dy))) scale(1.3) rotate(var(--rot)); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 110px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45, 45, 58, 0.95);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 500;
      z-index: 1000;
      animation: toastIn 280ms ease-out, toastOut 320ms ease-in 2.5s forwards;
      pointer-events: none;
      max-width: calc(100vw - 48px);
      text-align: center;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 16px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: translate(-50%, -8px); }
    }
  </style>
</head>
<body>
  <div class="toggles">
    <button id="lykkeToggle" class="toggle lykke" type="button" aria-label="Lykke og Nis-tilstand" title="Lykke og Nis">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 21s-7.5-4.5-9.5-9.5C1.2 8.3 3.4 5 6.7 5c1.9 0 3.4 1 4.3 2.3l1 1.4 1-1.4C13.9 6 15.4 5 17.3 5c3.3 0 5.5 3.3 4.2 6.5C19.5 16.5 12 21 12 21z"/>
      </svg>
    </button>
    <button id="balderToggle" class="toggle balder" type="button" aria-label="Balder-tilstand" title="Balder">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <ellipse cx="12" cy="16" rx="5" ry="4"/>
        <ellipse cx="6" cy="10" rx="2" ry="2.5"/>
        <ellipse cx="9.5" cy="7" rx="1.7" ry="2.2"/>
        <ellipse cx="14.5" cy="7" rx="1.7" ry="2.2"/>
        <ellipse cx="18" cy="10" rx="2" ry="2.5"/>
      </svg>
    </button>
  </div>

    <div id="indhold">

    <button id="indlosKnap" type="button" hidden>Indl&oslash;s &#128140;</button>

    const KUPON_CHANCE = 0.04; // 4% chance per tryk
    const REDEEMED_KEY = "komplimenter_redeemed_v1";

    const tekst = document.getElementById('tekst');
    const indhold = document.getElementById('indhold');
    const knap = document.getElementById('knap');
    const indlosKnap = document.getElementById('indlosKnap');
    const balderToggle = document.getElementById('balderToggle');
    const lykkeToggle = document.getElementById('lykkeToggle');
    const foto = document.getElementById('foto');

    let sidsteIndeks = -1;
    let mode = 'default'; // 'default' | 'balder' | 'lykke'
    let aktivKupon = null; // sat når en kupon vises
    const BALDER_LISTE = KOMPLIMENTER.filter(c => c.includes('Balder'));

    /* ---------- Indløste kuponer (localStorage) ---------- */

    function getIndloste() {
      try { return JSON.parse(localStorage.getItem(REDEEMED_KEY) || '[]'); }
      catch { return []; }
    }

    function gemIndloste(liste) {
      try { localStorage.setItem(REDEEMED_KEY, JSON.stringify(liste)); }
      catch {}
    }

    function tilgaengeligeKuponer() {
      const indloste = getIndloste();
      const ledige = KUPONER.filter(k => !indloste.includes(k));
      if (ledige.length === 0) {
        gemIndloste([]);
        return KUPONER.slice();
      }
      return ledige;
    }

    function markerIndlost(kupon) {
      const liste = getIndloste();
      if (!liste.includes(kupon)) {
        liste.push(kupon);
        gemIndloste(liste);
      }
    }

    /* ---------- Visning ---------- */

    function vaelgIndeks(liste) {
      if (liste.length <= 1) return 0;
      let i;
      do { i = Math.floor(Math.random() * liste.length); }
      while (i === sidsteIndeks);
      return i;
    }

    function aktivKomplimentliste() {
      return mode === 'balder' ? BALDER_LISTE : KOMPLIMENTER;
    }

    function visKompliment(animer) {
      // Kuponer kan kun komme i default-mode
      const kuponPulje = mode === 'default' ? tilgaengeligeKuponer() : [];
      const erKupon = kuponPulje.length > 0 && Math.random() < KUPON_CHANCE;
      const liste = erKupon ? kuponPulje : aktivKomplimentliste();
      const i = vaelgIndeks(liste);
      sidsteIndeks = i;

      const opdater = () => {
        indhold.classList.toggle('kupon', erKupon);
        tekst.textContent = liste[i];
        aktivKupon = erKupon ? liste[i] : null;
        indlosKnap.hidden = !erKupon;
      };

      if (animer) {
        indhold.classList.add('skifter');
        setTimeout(() => {
          opdater();
          indhold.classList.remove('skifter');
        }, 220);
      } else {
        opdater();
      }
    }

    /* ---------- Hjerter ---------- */

    function spawnHearts(centerX, topY) {
      const count = 4 + Math.floor(Math.random() * 4);
      const symboler = ['❤', '\u{1F495}', '\u{1F496}', '\u{1F497}'];
      const farver = ['#ff6b9d', '#e94560', '#ffb3c1', '#ff8da1', '#ffffff'];

      for (let i = 0; i < count; i++) {
        const h = document.createElement('span');
        h.className = 'heart';
        h.textContent = symboler[Math.floor(Math.random() * symboler.length)];
        h.style.left = centerX + 'px';
        h.style.top = topY + 'px';
        h.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
        h.style.setProperty('--dy', (Math.random() * 60 - 30) + 'px');
        h.style.setProperty('--rot', (Math.random() * 80 - 40) + 'deg');
        h.style.fontSize = (1.2 + Math.random() * 1.6) + 'rem';
        h.style.color = farver[Math.floor(Math.random() * farver.length)];
        h.style.animationDelay = (Math.random() * 120) + 'ms';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1900);
      }
    }

    /* ---------- Toast ---------- */

    function visToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3100);
    }

    /* ---------- Foto-tilstande ---------- */

    function vaelgFoto(liste) {
      if (!liste.length) return null;
      return liste[Math.floor(Math.random() * liste.length)];
    }

    function setMode(nyMode) {
      mode = (mode === nyMode) ? 'default' : nyMode;

      document.body.classList.toggle('balder-mode', mode === 'balder');
      document.body.classList.toggle('lykke-mode',  mode === 'lykke');
      balderToggle.classList.toggle('active', mode === 'balder');
      lykkeToggle.classList.toggle('active',  mode === 'lykke');

      if (mode === 'balder') {
        const src = vaelgFoto(BALDER_BILLEDER);
        if (src) { foto.src = src; foto.hidden = false; }
      } else if (mode === 'lykke') {
        const src = vaelgFoto(LYKKE_BILLEDER);
        if (src) { foto.src = src; foto.hidden = false; }
      } else {
        foto.hidden = true;
        foto.removeAttribute('src');
      }

      sidsteIndeks = -1;
      visKompliment(true);
    }

    /* ---------- Indløsning ---------- */

    async function indlosKupon() {
      if (!aktivKupon) return;
      const tekst = aktivKupon;
      const besked = `🎟️ Jeg vil gerne indløse min kupon: "${tekst}" 💛`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: 'Kupon-indløsning',
            text: besked
          });
          markerIndlost(tekst);
          visToast('Indløst! Beskeden er sendt 💛');
        } else if (navigator.clipboard) {
          await navigator.clipboard.writeText(besked);
          markerIndlost(tekst);
          visToast('Kopieret — indsæt i Messenger 💛');
        } else {
          visToast('Kunne ikke dele — tag et screenshot i stedet');
        }
        // Skift til ny kompliment efter et kort øjeblik
        setTimeout(() => {
          aktivKupon = null;
          indlosKnap.hidden = true;
          visKompliment(true);
        }, 1200);
      } catch (e) {
        // Bruger annullerede share-dialogen — gør intet
      }
    }

    /* ---------- Event handlers ---------- */

    knap.addEventListener('click', () => {
      const r = knap.getBoundingClientRect();
      spawnHearts(r.left + r.width / 2, r.top);
      visKompliment(true);
    });

    indlosKnap.addEventListener('click', indlosKupon);
    balderToggle.addEventListener('click', () => setMode('balder'));
    lykkeToggle.addEventListener('click',  () => setMode('lykke'));

    /* ---------- Init ---------- */

    visKompliment(false);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
