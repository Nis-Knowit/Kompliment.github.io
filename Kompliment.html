<html lang="da">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Komplimenter">

  <link rel="manifest" href="manifest.webmanifest">

  <title>Komplimenter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      color: #2d2d3a;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      transition: background 700ms ease;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
      position: relative;
    }

    body.balder-mode { background: linear-gradient(135deg, #f5deb3 0%, #c19a6b 100%); }
    body.lykke-mode  { background: linear-gradient(135deg, #ffd1dc 0%, #e89bb0 100%); }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 8px;
      transition: opacity 240ms ease, transform 240ms ease;
    }

    main.skifter {
      opacity: 0;
      transform: translateY(8px);
    }

    #foto {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 0 24px 0;
      border: 4px solid rgba(255,255,255,0.78);
      box-shadow: 0 8px 22px rgba(45, 45, 58, 0.22);
      animation: dukOp 500ms ease-out;
    }

    @keyframes dukOp {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }

    #indhold { width: 100%; }

    #tekst {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 600;
      line-height: 1.35;
      text-align: center;
    }

    /* Kupon-styling */
    #indhold.kupon {
      background: #fffaf0;
      border: 3px dashed #c19a6b;
      border-radius: 18px;
      padding: 40px 24px 36px;
      position: relative;
      box-shadow: 0 10px 30px rgba(45, 45, 58, 0.18);
      max-width: 460px;
      margin: 0 auto;
    }

    #indhold.kupon::before {
      content: "KUPON";
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: #c19a6b;
      color: #fff;
      padding: 5px 16px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    #indhold.kupon::after {
      content: "Tryk på \"Indløs\" for at sende den til Nis";
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #fffaf0;
      color: #c19a6b;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #c19a6b;
      white-space: nowrap;
    }

    #indhold.kupon #tekst {
      font-style: italic;
      font-size: clamp(1.4rem, 5.5vw, 2rem);
      color: #5a3e1f;
    }

    /* Bund-knapper */
    .knapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    button {
      appearance: none;
      border: none;
      font: inherit;
      font-weight: 600;
      font-size: 1.05rem;
      color: #fff;
      background: #2d2d3a;
      padding: 18px 32px;
      border-radius: 999px;
      min-width: 240px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(45, 45, 58, 0.25);
      transition: transform 120ms ease, box-shadow 120ms ease, background 200ms ease;
    }

    button:active {
      transform: scale(0.97);
      box-shadow: 0 3px 10px rgba(45, 45, 58, 0.25);
    }

    #indlosKnap {
      background: #c19a6b;
      box-shadow: 0 6px 20px rgba(193, 154, 107, 0.45);
    }

    /* Svævende partikler (hjerter og poter) */
    .partikel {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: floatUp 1.7s ease-out forwards;
      will-change: transform, opacity;
    }

    .partikel.paw {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .partikel.paw svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translate(-50%, 0) scale(0.4) rotate(0deg); }
      15%  { opacity: 1; }
      100% { opacity: 0;
             transform: translate(calc(-50% + var(--dx)), calc(-260px + var(--dy))) scale(1.3) rotate(var(--rot)); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 110px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45, 45, 58, 0.95);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 500;
      z-index: 1000;
      animation: toastIn 280ms ease-out, toastOut 320ms ease-in 2.5s forwards;
      pointer-events: none;
      max-width: calc(100vw - 48px);
      text-align: center;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 16px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: translate(-50%, -8px); }
    }
  </style>
</head>

      "Morgenmad på sengen i morgen.",
      "En skovtur med Balder — du vælger ruten.",
      "Én spontan biltur — du vælger destination.",
      "Én lang bad-tid for dig alene.",
      "Jeg holder dig hele natten.",
      "En aften med din yndlings-vin og lidt for meget chokolade.",
      "Jeg ordner al opvask en hel uge.",
      "Én bagesession sammen — du vælger hvad.",
      "En eftermiddag uden telefoner — kun os.",
      "Én lang krammer uden grund.",
      "Et knus og en kop kaffe i sengen.",
      "Én ekstra dyne-tid søndag morgen.",
      "Du vælger næste serie — jeg klager ikke."
    ];

    const BALDER_BILLEDER = [
      "balder/IMG_2705-web.jpg",
      "balder/IMG_2862-web.jpg",
      "balder/IMG_3020-web.jpg",
      "balder/IMG_3092-web.jpg",
      "balder/IMG_3138-web.jpg",
      "balder/IMG_3152-web.jpg",
      "balder/IMG_3154-web.jpg",
      "balder/IMG_3177-web.jpg",
      "balder/IMG_3315-web.jpg",
      "balder/IMG_3458-web.jpg",
      "balder/IMG_3706-web.jpg",
      "balder/PXL_20240712_153202133-web.jpg",
      "balder/PXL_20240717_102602613-web.jpg",
      "balder/PXL_20240729_163847843-web.jpg",
      "balder/PXL_20240813_155754204.PORTRAIT-web.jpg",
      "balder/PXL_20240825_072608991.PORTRAIT~2-web.jpg",
      "balder/PXL_20240907_072410737.PORTRAIT~2-web.jpg",
      "balder/PXL_20240923_141331016.MP-web.jpg",
      "balder/PXL_20241006_161329759~2-web.jpg",
      "balder/PXL_20241027_091038208-web.jpg",
      "balder/PXL_20241224_091550753-web.jpg",
      "balder/PXL_20250322_063233832.PORTRAIT-web.jpg",
      "balder/PXL_20250322_063517645.PORTRAIT-web.jpg"
    ];

    const LYKKE_BILLEDER = [
      "lykke/20250829_152536-web.jpg",
      "lykke/20251018_110539-web.jpg",
      "lykke/20260116_212031-web.jpg",
      "lykke/IMG_0931-web.jpg",
      "lykke/IMG_1123-web.jpg",
      "lykke/IMG_1337-web.jpg",
      "lykke/IMG_1707-web.jpg",
      "lykke/IMG_20220220_215138-web.jpg",
      "lykke/IMG_3534-web.jpg",
      "lykke/IMG_7032-web.jpg",
      "lykke/Messenger_creation_411CF212-195F-4B36-8F25-4AB03A773174-web.jpg",
      "lykke/Messenger_creation_EDBB0863-553E-4D80-8D5A-B9D946B52731-web.jpg",
      "lykke/PXL_20230717_113634182.PORTRAIT~2-web.jpg",
      "lykke/PXL_20230717_132756368.PORTRAIT-web.jpg",
      "lykke/PXL_20230815_174444961.MP-web.jpg",
      "lykke/PXL_20241019_185226117.PORTRAIT-web.jpg",
      "lykke/PXL_20241231_143511833.PORTRAIT-web.jpg",
      "lykke/PXL_20250405_182406965.PORTRAIT-web.jpg"
    ];

    // Sandsynligheder pr. tryk
    const KUPON_CHANCE  = 0.04; // 4%
    const BALDER_CHANCE = 0.10; // 10%
    const LYKKE_CHANCE  = 0.10; // 10%
    // Resten er almindelig kompliment

    const REDEEMED_KEY = "komplimenter_redeemed_v1";
    const RECENT_KEY   = "komplimenter_recent_v1";
    const RECENT_LIMIT_MAIN   = 30; // husker de seneste 30 fra hele listen
    const RECENT_LIMIT_BALDER = 6;  // husker de seneste 6 fra Balder-listen
    const RECENT_LIMIT_KUPON  = 10; // husker de seneste 10 kuponer (ud over indløsningstracking)

    const tekst = document.getElementById('tekst');
    const indhold = document.getElementById('indhold');
    const main = document.getElementById('main');
    const knap = document.getElementById('knap');
    const indlosKnap = document.getElementById('indlosKnap');
    const foto = document.getElementById('foto');

    let aktivKupon = null;
    const BALDER_LISTE = KOMPLIMENTER.filter(c => c.includes('Balder'));

    /* ---------- Indløste kuponer ---------- */

    function getIndloste() {
      try { return JSON.parse(localStorage.getItem(REDEEMED_KEY) || '[]'); }
      catch { return []; }
    }

    function gemIndloste(liste) {
      try { localStorage.setItem(REDEEMED_KEY, JSON.stringify(liste)); }
      catch {}
    }

    function tilgaengeligeKuponer() {
      const indloste = getIndloste();
      const ledige = KUPONER.filter(k => !indloste.includes(k));
      if (ledige.length === 0) {
        gemIndloste([]);
        return KUPONER.slice();
      }
      return ledige;
    }

    function markerIndlost(kupon) {
      const liste = getIndloste();
      if (!liste.includes(kupon)) {
        liste.push(kupon);
        gemIndloste(liste);
      }
    }

    /* ---------- Nyligt viste (varians) ---------- */

    function getNylige() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '{}'); }
      catch { return {}; }
    }

    function gemNylige(obj) {
      try { localStorage.setItem(RECENT_KEY, JSON.stringify(obj)); }
      catch {}
    }

    function huskValg(navn, tekst, limit) {
      const r = getNylige();
      if (!r[navn]) r[navn] = [];
      r[navn].push(tekst);
      if (r[navn].length > limit) r[navn] = r[navn].slice(-limit);
      gemNylige(r);
    }

    // Vælg en tilfældig fra liste, men undgå dem der ligger i de seneste `limit`
    // for samme navn. Hvis næsten alle er udelukkede, falder den tilbage til
    // hele listen (skulle ikke ske med fornuftige limits).
    function vaelgFraListe(liste, navn, limit) {
      if (liste.length === 0) return null;
      if (liste.length === 1) {
        huskValg(navn, liste[0], limit);
        return liste[0];
      }
      const r = getNylige();
      const nylige = r[navn] || [];
      const effLimit = Math.min(limit, liste.length - 1);
      const blacklist = nylige.slice(-effLimit);
      const tilgaengelige = liste.filter(c => !blacklist.includes(c));
      const pool = tilgaengelige.length > 0 ? tilgaengelige : liste;
      const valgt = pool[Math.floor(Math.random() * pool.length)];
      huskValg(navn, valgt, limit);
      return valgt;
    }

    /* ---------- Mode-roll ---------- */

    function rulMode() {
      const r = Math.random();
      const kuponPulje = tilgaengeligeKuponer();

      let t = 0;
      if (kuponPulje.length > 0) {
        t += KUPON_CHANCE;
        if (r < t) return { type: 'coupon',  liste: kuponPulje };
      }
      t += BALDER_CHANCE;
      if (r < t) return { type: 'balder',  liste: BALDER_LISTE };
      t += LYKKE_CHANCE;
      if (r < t) return { type: 'lykke',   liste: KOMPLIMENTER };
      return { type: 'default', liste: KOMPLIMENTER };
    }

    /* ---------- Visning ---------- */

    function visForceMode(force) {
      // 'default' bruges ved første load — ingen partikler, ingen tilfældigheder
      const valg = force ? { type: 'default', liste: KOMPLIMENTER } : rulMode();

      // Vælg navn + limit afhængigt af type. 'default' og 'lykke' deler 'main'.
      let listeNavn, limit;
      if (valg.type === 'coupon')      { listeNavn = 'kupon';  limit = RECENT_LIMIT_KUPON; }
      else if (valg.type === 'balder') { listeNavn = 'balder'; limit = RECENT_LIMIT_BALDER; }
      else                              { listeNavn = 'main';   limit = RECENT_LIMIT_MAIN; }

      const valgtTekst = vaelgFraListe(valg.liste, listeNavn, limit);

      const opdater = () => {
        document.body.classList.toggle('balder-mode', valg.type === 'balder');
        document.body.classList.toggle('lykke-mode',  valg.type === 'lykke');

        if (valg.type === 'balder' && BALDER_BILLEDER.length) {
          foto.src = BALDER_BILLEDER[Math.floor(Math.random() * BALDER_BILLEDER.length)];
          foto.hidden = false;
        } else if (valg.type === 'lykke' && LYKKE_BILLEDER.length) {
          foto.src = LYKKE_BILLEDER[Math.floor(Math.random() * LYKKE_BILLEDER.length)];
          foto.hidden = false;
        } else {
          foto.hidden = true;
          foto.removeAttribute('src');
        }

        if (valg.type === 'coupon') {
          aktivKupon = valgtTekst;
          indhold.classList.add('kupon');
          indlosKnap.hidden = false;
        } else {
          aktivKupon = null;
          indhold.classList.remove('kupon');
          indlosKnap.hidden = true;
        }

        tekst.textContent = valgtTekst;
      };

      if (force) {
        opdater();
        return valg;
      }

      main.classList.add('skifter');
      setTimeout(() => {
        opdater();
        main.classList.remove('skifter');
      }, 230);

      return valg;
    }

    /* ---------- Partikler ---------- */

    function partikelFaelles(el, cx, cy, size) {
      el.className = 'partikel';
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.setProperty('--dx', (Math.random() * 220 - 110) + 'px');
      el.style.setProperty('--dy', (Math.random() * 60 - 30) + 'px');
      el.style.setProperty('--rot', (Math.random() * 80 - 40) + 'deg');
      el.style.animationDelay = (Math.random() * 140) + 'ms';
      if (size) {
        el.style.width = size + 'rem';
        el.style.height = size + 'rem';
      }
    }

    function spawnHearts(cx, cy, count) {
      const symboler = ['❤', '\u{1F495}', '\u{1F496}', '\u{1F497}'];
      const farver   = ['#ff6b9d', '#e94560', '#ffb3c1', '#ff8da1', '#ffffff'];
      const n = count || (4 + Math.floor(Math.random() * 4));

      for (let i = 0; i < n; i++) {
        const h = document.createElement('span');
        partikelFaelles(h, cx, cy);
        h.textContent = symboler[Math.floor(Math.random() * symboler.length)];
        h.style.fontSize = (1.2 + Math.random() * 1.6) + 'rem';
        h.style.color = farver[Math.floor(Math.random() * farver.length)];
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 2000);
      }
    }

    function spawnPaws(cx, cy, count) {
      const farver = ['#5a3e1f', '#8b4513', '#a0522d', '#c19a6b', '#d2b48c'];
      const n = count || (5 + Math.floor(Math.random() * 4));

      for (let i = 0; i < n; i++) {
        const w = document.createElement('span');
        const size = 1.6 + Math.random() * 1.4;
        partikelFaelles(w, cx, cy, size);
        w.classList.add('paw');
        const color = farver[Math.floor(Math.random() * farver.length)];
        w.innerHTML =
          '<svg viewBox="0 0 24 24" fill="' + color + '">' +
            '<ellipse cx="12" cy="16" rx="5" ry="4"/>' +
            '<ellipse cx="6" cy="10" rx="2" ry="2.5"/>' +
            '<ellipse cx="9.5" cy="7" rx="1.7" ry="2.2"/>' +
            '<ellipse cx="14.5" cy="7" rx="1.7" ry="2.2"/>' +
            '<ellipse cx="18" cy="10" rx="2" ry="2.5"/>' +
          '</svg>';
        document.body.appendChild(w);
        setTimeout(() => w.remove(), 2000);
      }
    }

    /* ---------- Toast ---------- */

    function visToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3100);
    }

    /* ---------- Indløsning ---------- */

    async function indlosKupon() {
      if (!aktivKupon) return;
      const k = aktivKupon;
      const besked = `🎟️ Jeg vil gerne indløse min kupon: "${k}" 💛`;

      try {
        if (navigator.share) {
          await navigator.share({ title: 'Kupon-indløsning', text: besked });
          markerIndlost(k);
          visToast('Indløst! Beskeden er sendt 💛');
        } else if (navigator.clipboard) {
          await navigator.clipboard.writeText(besked);
          markerIndlost(k);
          visToast('Kopieret — indsæt i Messenger 💛');
        } else {
          visToast('Kunne ikke dele — tag et screenshot i stedet');
        }
        setTimeout(() => {
          aktivKupon = null;
          indlosKnap.hidden = true;
          handleTap();
        }, 1200);
      } catch {
        // brugeren annullerede
      }
    }

    /* ---------- Tap-handler ---------- */

    function handleTap() {
      const valg = visForceMode(false);
      const r = knap.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top;

      if (valg.type === 'balder') {
        spawnPaws(cx, cy);
      } else if (valg.type === 'lykke') {
        spawnHearts(cx, cy, 7); // lidt flere hjerter til Lykke-overraskelsen
      } else if (valg.type === 'coupon') {
        spawnHearts(cx, cy, 3); // få og diskrete
      } else {
        spawnHearts(cx, cy);
      }
    }

    knap.addEventListener('click', handleTap);
    indlosKnap.addEventListener('click', indlosKupon);

    /* ---------- Init ---------- */

    visForceMode(true);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
